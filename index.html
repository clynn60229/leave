<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>и«ӢеҒҮз”іи«Ӣ</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:30px 25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  margin-bottom:25px;
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>и«ӢеҒҮз”іи«Ӣ</h2>

<input id="name" placeholder="е§“еҗҚ">

<select id="type">
  <option value="">и«ӢйҒёж“ҮйЎһеһӢ</option>
  <option>дәӢеҒҮ</option>
  <option>е…¬еҒҮ</option>
  <option>е©ҡеҒҮ</option>
  <option>е–ӘеҒҮ</option>
  <option>е№ҙеҒҮ</option>
  <option>з—…еҒҮ</option>
</select>

<input id="date" inputmode="numeric" placeholder="и«ӢеҒҮж—Ҙжңҹ (дҫӢ: 2026/03/22)">

<input id="time" inputmode="numeric" placeholder="и«ӢеҒҮжҷӮй–“ (дҫӢ: 09:00-18:00)">

<input id="hours" inputmode="decimal" placeholder="и«ӢеҒҮжҷӮж•ё (дҫӢ: 8)">

<button onclick="submitForm()">йҖҒеҮә</button>

</div>

<script>

// й©—иӯү
function validate(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value.trim();
  const time = document.getElementById("time").value.trim();
  const hours = document.getElementById("hours").value;

  if(!name){
    alert("и«Ӣијёе…Ҙе§“еҗҚ");
    return false;
  }

  if(!type){
    alert("и«ӢйҒёж“ҮйЎһеһӢ");
    return false;
  }

  // ж—Ҙжңҹж јејҸпјҡ2026/03/22
  if(!/^\d{4}\/\d{2}\/\d{2}$/.test(date)){
    alert("ж—Ҙжңҹж јејҸйҢҜиӘӨ (дҫӢ: 2026/03/22)");
    return false;
  }

  // жҷӮй–“ж јејҸпјҡ09:00-18:00
  if(!/^\d{2}:\d{2}-\d{2}:\d{2}$/.test(time)){
    alert("жҷӮй–“ж јејҸйҢҜиӘӨ (дҫӢ: 09:00-18:00)");
    return false;
  }

  if(!hours || hours <= 0){
    alert("и«Ӣијёе…ҘжӯЈзўәжҷӮж•ё");
    return false;
  }

  return true;
}


// йҖҒеҮә
function submitForm(){

  if(!validate()) return;

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const hours = document.getElementById("hours").value;

  fetch("рҹ‘үйҖҷиЈЎиІјдҪ зҡ„Apps Scriptз¶ІеқҖ",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      type:type,
      date:date,
      time:time,
      hours:hours
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("йҖҒеҮәжҲҗеҠҹ");

    // жё…з©әж¬„дҪҚ
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
    document.getElementById("hours").value = "";
  })
  .catch(err => {
    alert("йҖҒеҮәеӨұж•—");
  });

}

</script>

</body>
</html>
