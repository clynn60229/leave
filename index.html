<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>菲塔請假申請</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}

*{
  box-sizing:border-box;
}

.container{
  width:90%;
  max-width:420px;
  margin:auto;
}
  
.row{
  display:flex;
  gap:10px;
}

.row input,
.row select{
  flex:1;          /* ⭐ 關鍵：平均分 */
  min-width:0;     /* ⭐ 防止爆版 */
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* 每一塊 */
.field{
  margin-bottom:15px;
}

/* 標題（粗體） */
.title{
  display:block;
  font-weight:bold;
  margin-bottom:8px;
  font-size:16px;
}

/* 修正 datetime 爆版 */
input[type="datetime-local"]{
  width:100%;
  max-width:100%;
  min-width:0;
  display:block;
}

h2{
  margin-bottom:25px;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>請假申請</h2>

<div id="userName" style="margin-bottom:15px;font-weight:bold;"></div>

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>公假</option>
  <option>婚假</option>
  <option>喪假</option>
  <option>年假</option>
  <option>病假</option>
</select>

<!-- 開始時間 -->
<div class="field">
  <label class="title">開始時間</label>
  <div class="row">
    <input type="date" id="startDate">
    <select id="startTime"></select>
  </div>

  <div class="row">
    <input type="date" id="endDate">
    <select id="endTime"></select>
  </div>
</div>

<div class="field">
  <label class="title">請假證明(事/年假除外）</label>
  <input type="file" id="file">
</div>

<button onclick="submitForm()">送出</button>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
let isSubmitting = false;

let userId = ""
let userName = ""  // 👉 存LINE名字

window.addEventListener("load", function(){
  generateTimeOptions("startTime")
  generateTimeOptions("endTime")

  if(typeof liff !== "undefined"){
    initLIFF()
  }
})
  
async function initLIFF(){
  try{
    await liff.init({ liffId: "2009561233-W2o7PGug" })

    if(!liff.isLoggedIn()){
      liff.login()
      return
    }

    const profile = await liff.getProfile()

    userName = profile.displayName
    userId = profile.userId

    // 顯示在畫面上
    document.getElementById("userName").innerText = "姓名：" + userName
  }catch(e){
    console.log("LIFF error:", e)
  }
}
  
function generateTimeOptions(selectId){
  const select = document.getElementById(selectId)

  let startHour = 9
  let startMin = 30

  let endHour = 18
  let endMin = 30

  let current = new Date()
  current.setHours(startHour, startMin, 0)

  const end = new Date()
  end.setHours(endHour, endMin, 0)

  while(current <= end){
    let h = String(current.getHours()).padStart(2,'0')
    let m = String(current.getMinutes()).padStart(2,'0')

    const timeStr = `${h}:${m}`

    const option = document.createElement("option")
    option.value = timeStr
    option.textContent = timeStr

    select.appendChild(option)

    current.setMinutes(current.getMinutes() + 15)
  }
}
  
// 驗證
function validate(){

  const type = document.getElementById("type").value;

  const startDate = document.getElementById("startDate").value;
  const startTime = document.getElementById("startTime").value;

  const endDate = document.getElementById("endDate").value;
  const endTime = document.getElementById("endTime").value;

  const fileInput = document.getElementById("file")
  const file = fileInput.files.length > 0 ? fileInput.files[0] : null

  if(!type){
    alert("請選擇類型");
    return false;
  }

  if(!startDate || !startTime){
    alert("請選擇開始日期與時間");
    return false;
  }

  if(!endDate || !endTime){
    alert("請選擇結束日期與時間");
    return false;
  }

  const start = new Date(startDate + "T" + startTime);
  const end = new Date(endDate + "T" + endTime);

  if(end <= start){
    alert("結束時間必須晚於開始時間");
    return false;
  }

  // 👉 非事假 / 年假才需要附件
  if(type !== "事假" && type !== "年假"){
    if(!file){
      alert("請上傳請假證明")
      return false
    }
  }

  return true;
}


// 送出
async function submitForm(){

  if(isSubmitting){
    alert("⏳ 資料送出中，請勿重複點擊")
    return
  }

  if(!validate()) return;

  isSubmitting = true

  const btn = document.querySelector("button")
  const originalText = btn.innerText

  try{
    btn.disabled = true
    btn.innerText = "送出中..."

    const type = document.getElementById("type").value
    const startDate = document.getElementById("startDate").value
    const startTime = document.getElementById("startTime").value
    const endDate = document.getElementById("endDate").value
    const endTime = document.getElementById("endTime").value

    const fileInput = document.getElementById("file")
    const file = fileInput.files.length > 0 ? fileInput.files[0] : null

    const start = startDate + " " + startTime
    const end = endDate + " " + endTime

    // ⭐ 改這裡：用 FormData
    const formData = new FormData()
    formData.append("userId", userId)
    formData.append("name", userName)
    formData.append("type", type)
    formData.append("start", start)
    formData.append("end", end)

    if(file){
      formData.append("file", file)  // ⭐ 真正的檔案
    }

    const res = await fetch("https://script.google.com/macros/s/AKfycbwel905_by65VF_WWBo5yAIChZsYw-yEdPJT-8hS64fhN1HvC4Ogilp0HwIf-a4Q3qOhw/exec",{
      method:"POST",
      body: formData
    })

    const text = await res.text()
    console.log("回傳:", text)

    if(text.includes("success") || text === "ok"){
      alert("✅送出成功")

      if(typeof liff !== "undefined" && liff.isInClient()){
        liff.closeWindow()
      }
    }else{
      throw new Error(text)
    }

  }catch(err){
    console.log("錯誤:", err)
    alert("❌送出失敗\n" + err.message)
  }finally{
    isSubmitting = false
    btn.disabled = false
    btn.innerText = originalText
  }
}

</script>
