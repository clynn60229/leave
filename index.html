<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:25px;
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

.title{
  font-weight:bold;
  margin-bottom:5px;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  background:#007AFF;
  color:#fff;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>遲到請假</h2>

<input id="name" placeholder="姓名">

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>病假</option>
</select>

<div class="title">日期</div>
<input type="date" id="date">

<div class="title">實際上班時間</div>
<input type="time" id="time">

<div class="title">請假時數（自動計算）</div>
<input id="hours" readonly>

<button onclick="submitForm()">送出</button>

</div>

<script>

// ⭐ 核心：區間制計算
function calculateLeaveHours(time){

  const [h, m] = time.split(":").map(Number);
  const total = h * 60 + m;

  const workStart = 9 * 60 + 30; // 09:30

  let late = total - workStart;

  if(late <= 15){
    return 0;
  }

  late -= 15;

  let hours = Math.ceil(late / 30) * 0.5;

  return hours;
}


// ⭐ 自動計算
document.getElementById("time").addEventListener("change", function(){

  if(!this.value) return;

  let hours = calculateLeaveHours(this.value);

  document.getElementById("hours").value = hours;
});


// ⭐ 送出
function submitForm(){

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const hours = document.getElementById("hours").value;

  if(!name || !type || !date || !time){
    alert("請填寫完整資料");
    return;
  }

  fetch("👉貼你的GAS網址",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      type:type,
      date:date,
      time:time,
      hours:hours
    })
  })
  .then(res => res.json())
  .then(()=>{
    alert("送出成功");
  })
  .catch(()=>{
    alert("送出失敗");
  });
}

</script>

</body>
</html>
