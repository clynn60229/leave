<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>請假申請</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:30px 25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  margin-bottom:25px;
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>請假申請</h2>

<input id="name" placeholder="姓名">

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>公假</option>
  <option>婚假</option>
  <option>喪假</option>
  <option>年假</option>
  <option>病假</option>
</select>

<label>開始時間</label>
<input type="datetime-local" id="start">

<label>結束時間</label>
<input type="datetime-local" id="end">
  
<input 
  id="hours" 
  type="number" 
  step="0.5" 
  min="0.5"
  placeholder="請假時數 (例: 1.5, 2, 3.5)"
>

<button onclick="submitForm()">送出</button>

</div>

<script>

// 驗證
function validate(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const hours = parseFloat(document.getElementById("hours").value);

  if(!name){
    alert("請輸入姓名");
    return false;
  }

  if(!type){
    alert("請選擇類型");
    return false;
  }

  if(!start){
    alert("請選擇開始時間");
    return false;
  }

  if(!end){
    alert("請選擇結束時間");
    return false;
  }

  // 🔥 結束不能早於開始
  if(new Date(end) <= new Date(start)){
    alert("結束時間必須晚於開始時間");
    return false;
  }

  if(!hours || hours <= 0){
    alert("請輸入正確時數");
    return false;
  }

  // 只能 0.5 單位
  if((hours * 2) % 1 !== 0){
    alert("請假時數只能以 0.5 為單位");
    return false;
  }

  return true;
}
  

// 送出
function submitForm(){

  if(!validate()) return;

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const hours = document.getElementById("hours").value;

  fetch("👉這裡貼你的Apps Script網址",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      type:type,
      date:date,
      time:time,
      hours:hours
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("送出成功");

    // 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
    document.getElementById("hours").value = "";
  })
  .catch(err => {
    alert("送出失敗");
  });

}

</script>

</body>
</html>
