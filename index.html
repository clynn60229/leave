<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>請假申請</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}
.container{
  width:90%;
  max-width:420px;
}
input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
}
button{
  width:100%;
  padding:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>請假申請</h2>

<input id="name" placeholder="姓名">

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>病假</option>
</select>

<input type="date" id="startDate">
<input type="time" id="startTime">

<input type="date" id="endDate">
<input type="time" id="endTime">

<input id="hours" placeholder="時數">

<button onclick="submitForm()">送出</button>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

window.onload = function(){
  initLIFF()
}

async function initLIFF(){
  try{
    await liff.init({ liffId: "2009561233-W2o7PGug" })

    if(!liff.isLoggedIn()){
      liff.login()
      return
    }

    const profile = await liff.getProfile()

    const nameInput = document.getElementById("name")
    if(nameInput){
      nameInput.value = profile.displayName
    }

  }catch(e){
    console.log("LIFF error:", e)
  }
}

// 驗證
function validate(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;

  const startDate = document.getElementById("startDate").value;
  const startTime = document.getElementById("startTime").value;

  const endDate = document.getElementById("endDate").value;
  const endTime = document.getElementById("endTime").value;

  const hours = parseFloat(document.getElementById("hours").value);

  if(!name){
    alert("請輸入姓名");
    return false;
  }

  if(!type){
    alert("請選擇類型");
    return false;
  }

  if(!startDate || !startTime){
    alert("請選擇開始日期與時間");
    return false;
  }

  if(!endDate || !endTime){
    alert("請選擇結束日期與時間");
    return false;
  }

  const start = new Date(startDate + "T" + startTime);
  const end = new Date(endDate + "T" + endTime);

  if(end <= start){
    alert("結束時間必須晚於開始時間");
    return false;
  }

  if(!hours || hours <= 0){
    alert("請輸入正確時數");
    return false;
  }

  if((hours * 2) % 1 !== 0){
    alert("請假時數只能以 0.5 為單位");
    return false;
  }

  return true;
}


// 送出
async function submitForm(){

  if(!validate()) return;

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;

  const startDate = document.getElementById("startDate").value;
  const startTime = document.getElementById("startTime").value;

  const endDate = document.getElementById("endDate").value;
  const endTime = document.getElementById("endTime").value;

  const hours = document.getElementById("hours").value;

  const start = startDate + " " + startTime;
  const end = endDate + " " + endTime;

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycby7h0fahcWcMyszSaVLCdjh9bLqk73wdoDGCcdcwPMhfxQ6TJt5zbfsOWwy9azqUGBNYQ/exec",{
      method:"POST",
      body:JSON.stringify({
        name,
        type,
        start,
        end,
        hours
      })
    })

    const data = await res.json()

    alert("送出成功")

    // 👉 關閉 LIFF
    if(liff.isInClient()){
      liff.closeWindow()
    }

    // 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("startDate").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endDate").value = "";
    document.getElementById("endTime").value = "";
    document.getElementById("hours").value = "";

  }catch(err){
    alert("送出失敗")
  }

}

</script>
