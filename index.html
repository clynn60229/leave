<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>請假申請</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  border-radius:20px;
  padding:30px 25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  text-align:center;
}

h2{
  margin-bottom:25px;
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>請假申請</h2>

<input id="name" placeholder="姓名">

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>公假</option>
  <option>婚假</option>
  <option>喪假</option>
  <option>年假</option>
  <option>病假</option>
</select>

<input id="date" placeholder="請假日期 (例: 2026/03/22 ~ 2026/03/25)">
<input id="time" placeholder="請假時間 (例: 09:00 ~ 18:00)">
<input id="hours" inputmode="decimal" placeholder="請假時數 (例: 8)">

<button onclick="submitForm()">送出</button>

</div>

<script>

// 驗證
function validate(){

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value.trim();
  const time = document.getElementById("time").value.trim();
  const hours = document.getElementById("hours").value;

  if(!name){
    alert("請輸入姓名");
    return false;
  }

  if(!type){
    alert("請選擇類型");
    return false;
  }

  const datePattern = /^\d{4}\/\d{2}\/\d{2}( *~ *\d{4}\/\d{2}\/\d{2})?$/;
  if(!datePattern.test(date)){
    alert("日期格式錯誤 (例: 2026/03/22 或 2026/03/22 ~ 2026/03/25)");
    return false;
  }

  const timePattern = /^\d{2}:\d{2}( *~ *\d{2}:\d{2})?$/;
  if(!timePattern.test(time)){
    alert("時間格式錯誤 (例: 09:00 或 09:00 ~ 18:00)");
    return false;
  }

  if(!hours || hours <= 0){
    alert("請輸入正確時數");
    return false;
  }

  return true;
}


// 送出
function submitForm(){

  if(!validate()) return;

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const hours = document.getElementById("hours").value;

  fetch("👉這裡貼你的Apps Script網址",{
    method:"POST",
    body:JSON.stringify({
      name:name,
      type:type,
      date:date,
      time:time,
      hours:hours
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("送出成功");

    // 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
    document.getElementById("hours").value = "";
  })
  .catch(err => {
    alert("送出失敗");
  });

}

</script>

</body>
</html>
