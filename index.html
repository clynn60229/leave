<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>請假申請</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f6fa;
  font-family:-apple-system, BlinkMacSystemFont;
}

*{
  box-sizing:border-box;
}

.container{
  width:90%;
  max-width:420px;
  margin:auto;
}
  
.row{
  display:flex;
  gap:10px;
}

.row input{
  flex:1;
  min-width:0;
}

input, select{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* 每一塊 */
.field{
  margin-bottom:15px;
}

/* 標題（粗體） */
.title{
  display:block;
  font-weight:bold;
  margin-bottom:8px;
  font-size:16px;
}

/* 修正 datetime 爆版 */
input[type="datetime-local"]{
  width:100%;
  max-width:100%;
  min-width:0;
  display:block;
}

h2{
  margin-bottom:25px;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#007AFF;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>請假申請</h2>

<div id="userName" style="margin-bottom:15px;font-weight:bold;"></div>

<select id="type">
  <option value="">請選擇類型</option>
  <option>事假</option>
  <option>公假</option>
  <option>婚假</option>
  <option>喪假</option>
  <option>年假</option>
  <option>病假</option>
</select>

<!-- 開始時間 -->
<div class="field">
  <label class="title">開始時間</label>
  <div class="row">
    <input type="date" id="startDate">
    <input type="time" id="startTime" step="900">
  </div>
</div>

<div class="field">
  <label class="title">結束時間</label>
  <div class="row">
    <input type="date" id="endDate">
    <input type="time" id="endTime" step="900">
  </div>
</div>

<!-- 請假時數 -->
<div class="field">
  <label class="title">請假時數</label>
  <input 
    id="hours" 
    type="number" 
    step="0.5" 
    min="0.5"
    placeholder="以 0.5 小時為單位 例：1, 2.5, 4"
  >
</div>

<button onclick="submitForm()">送出</button>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
  
let userName = ""  // 👉 存LINE名字

window.onload = function(){
  if(typeof liff !== "undefined"){
    initLIFF()
  }
}
  
async function initLIFF(){
  try{
    await liff.init({ liffId: "2009561233-W2o7PGug" })

    if(!liff.isLoggedIn()){
      liff.login()
      return
    }

    const profile = await liff.getProfile()

    userName = profile.displayName

    // 顯示在畫面上
    document.getElementById("userName").innerText = "姓名：" + userName
  }catch(e){
    console.log("LIFF error:", e)
  }
}

// 驗證
function validate(){

  const type = document.getElementById("type").value;

  const startDate = document.getElementById("startDate").value;
  const startTime = document.getElementById("startTime").value;

  const endDate = document.getElementById("endDate").value;
  const endTime = document.getElementById("endTime").value;

  const hours = parseFloat(document.getElementById("hours").value);

  if(!type){
    alert("請選擇類型");
    return false;
  }

  if(!startDate || !startTime){
    alert("請選擇開始日期與時間");
    return false;
  }

  if(!endDate || !endTime){
    alert("請選擇結束日期與時間");
    return false;
  }

  const start = new Date(startDate + "T" + startTime);
  const end = new Date(endDate + "T" + endTime);

  if(end <= start){
    alert("結束時間必須晚於開始時間");
    return false;
  }

  if(!hours || hours <= 0){
    alert("請輸入正確時數");
    return false;
  }

  if((hours * 2) % 1 !== 0){
    alert("請假時數只能以 0.5 為單位");
    return false;
  }

  return true;
}


// 送出
async function submitForm(){

  if(!validate()) return;

  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;

  const startDate = document.getElementById("startDate").value;
  const startTime = document.getElementById("startTime").value;

  const endDate = document.getElementById("endDate").value;
  const endTime = document.getElementById("endTime").value;

  const hours = document.getElementById("hours").value;

  const start = startDate + " " + startTime;
  const end = endDate + " " + endTime;

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycby7h0fahcWcMyszSaVLCdjh9bLqk73wdoDGCcdcwPMhfxQ6TJt5zbfsOWwy9azqUGBNYQ/exec",{
      method:"POST",
      body:JSON.stringify({
        name,
        type,
        start,
        end,
        hours
      })
    })

    const data = await res.json()

    alert("送出成功")

    // 👉 關閉 LIFF
    if(liff.isInClient()){
      liff.closeWindow()
    }

    // 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("startDate").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endDate").value = "";
    document.getElementById("endTime").value = "";
    document.getElementById("hours").value = "";

  }catch(err){
    alert("送出失敗")
  }

}

</script>
